<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Weather App</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/token.css">
</head>
<body>
    <div class="container">
        <div class="main-card">
            <!-- Left Section: Current Weather -->
            <div class="left-section">
                <div class="left-content">
                    <div class="date-info">
                        <h1 class="day-title">Monday</h1>
                        <p class="date-text">20 Jun 2022</p>
                    </div>
                    
                    <div class="current-weather">
                        <img class="sun-icon" src="img/sun icon white.png" alt="Sun">
                        <div class="temp-info">
                            <p class="temperature">29 °C</p>
                            <p class="condition">Sunny</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Section: Details -->
            <div class="right-section">
                <!-- Weather Details -->
                <div class="weather-details">
                    <div class="detail-row">
                        <span class="detail-label">PRECIPITATION</span>
                        <span class="detail-value">0%</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">HUMIDITY</span>
                        <span class="detail-value">42%</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">WIND</span>
                        <span class="detail-value">3 km/h</span>
                    </div>
                </div>

                <!-- Forecast Cards -->
                <div class="forecast-container">
                    <div class="forecast-card">
                        <img class="forecast-icon" src="img/sun icon black.png" alt="Sun">
                        <p class="forecast-day">Tue</p>
                        <p class="forecast-temp">30 °C</p>
                    </div>
                    
                    <div class="forecast-card dark">
                        <img class="forecast-icon" src="img/cloudy sun icon white.png" alt="Cloudy Sun">
                        <p class="forecast-day">Wed</p>
                        <p class="forecast-temp">22 °C</p>
                    </div>
                    
                    <div class="forecast-card dark">
                        <img class="forecast-icon" src="img/rain icon white.png" alt="Rain">
                        <p class="forecast-day">Thu</p>
                        <p class="forecast-temp">16 °C</p>
                    </div>
                    
                    <div class="forecast-card dark">
                        <img class="forecast-icon" src="img/cloudy sun icon white.png" alt="Cloudy Sun">
                        <p class="forecast-day">Fri</p>
                        <p class="forecast-temp">26 °C</p>
                    </div>
                </div>

                <!-- Location Button -->
                <div class="location-btn">
                    <img class="location-icon" src="img/location icon.png" alt="Location">
                    <span>New York City</span>
                </div>

                <!-- Moon Info -->
                <div class="moon-card">
                    <svg class="moon-image" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <radialGradient id="moonGrad" cx="35%" cy="35%">
                                <stop offset="0%" style="stop-color:white;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#ccc;stop-opacity:1" />
                            </radialGradient>
                        </defs>
                        <circle cx="50" cy="50" r="45" fill="url(#moonGrad)"/>
                    </svg>
                    <div class="moon-details">
                        <div class="moon-row">
                            <span class="moon-label">MOON</span>
                            <span class="moon-value">Waning Gibbous</span>
                        </div>
                        <div class="moon-row">
                            <span class="moon-label">ILLUMINATION</span>
                            <span class="moon-value">87%</span>
                        </div>
                        <div class="moon-row">
                            <span class="moon-label">MOONRISE</span>
                            <span class="moon-value">9:32PM</span>
                        </div>
                        <div class="moon-row">
                            <span class="moon-label">NEXT FULL MOON</span>
                            <span class="moon-value">26 Days</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
